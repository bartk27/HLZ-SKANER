<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skaner plomb</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#e9eef3;
margin:0;
padding:10px;
}


h1{
background:#1565c0;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
font-size:22px;
}


.box{

background:white;
padding:12px;
margin-top:10px;
border-radius:12px;
box-shadow:0 2px 8px #bbb;

}



#reader{

width:300px;
max-width:100%;
margin:auto;

}


#reader video{

border-radius:12px;

}



.status{

padding:10px;
margin-top:8px;
border-radius:8px;
text-align:center;
font-weight:bold;

}


.good{

background:#c8e6c9;
color:#1b5e20;

}


.bad{

background:#ffcdd2;
color:#b71c1c;

}



.number{

font-size:28px;
font-weight:bold;
text-align:center;
margin:15px 0;

}




.barcode-box{

background:white;
padding:15px;
border-radius:10px;
border:2px solid black;
text-align:center;

}



#barcode{

width:100%;
height:120px;

}




.history button{

width:100%;
padding:12px;
margin-top:6px;
border:0;
border-radius:10px;
background:#dceeff;
font-size:17px;
font-weight:bold;

}



.count{

text-align:center;
font-size:22px;

}


</style>

</head>


<body>


<h1>
📷 SKANER PLOMB
</h1>




<div class="box">

<h3>Kamera</h3>

<div id="reader"></div>

<div id="status" class="status">
Uruchamianie...
</div>
